name: Protocol Integration Test (mihomo)

on:
  push:
    branches: ['**']
    paths:
      - 'src/protocols/**'
      - 'workflows/**'
      - '.github/workflows/protocol-test.yml'
  pull_request:
  workflow_dispatch:
    inputs:
      protocol:
        description: 'Protocol to test (comma-separated)'
        default: ''
        required: false

jobs:
  protocol-test:
    name: Test protocols (mihomo)
    runs-on: ubuntu-latest
    container:
      image: debian:12
    steps:
      - name: Install CI dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl git build-essential pkg-config cmake clang libclang-dev llvm-dev python3 python3-pip sudo zstd

          # Setup gh CLI repo (curl now available)
          mkdir -p -m 755 /usr/share/keyrings
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg -o /usr/share/keyrings/githubcli-archive-keyring.gpg
          chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null

          apt-get update
          apt-get install -y --no-install-recommends gh

          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
          pip3 install --break-system-packages pyyaml

      - name: Checkout NodeRS
        uses: actions/checkout@v5

      - name: Checkout Aerion
        uses: actions/checkout@v5
        with:
          repository: MoeclubM/Aerion
          path: Aerion

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts (NodeRS)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            Aerion

      - name: Build aerion binary
        run: cargo build --manifest-path Aerion/Cargo.toml

      - name: Build noders binary
        run: cargo build

      - name: Download mihomo Alpha pre-built
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MIHOMO_URL=$(gh api repos/MetaCubeX/mihomo/releases/tags/Prerelease-Alpha \
            --jq '.assets[] | select(.name | test("mihomo-linux-amd64-.*\\.gz$") and (test("go[0-9]") | not)) | .browser_download_url' \
            | head -1)
          echo "Downloading: $MIHOMO_URL"
          curl -fsSLo /tmp/mihomo.gz "$MIHOMO_URL"
          gunzip /tmp/mihomo.gz
          chmod +x /tmp/mihomo
          /tmp/mihomo -v

      - name: Run protocol integration test
        env:
          PROTO: ${{ github.event.inputs.protocol || '' }}
          AERION_DIR: ${{ github.workspace }}/Aerion
        run: |
          if [ -n "${PROTO}" ]; then
            python3 workflows/test_all_protocols_mihomo.py \
              --only-protocols "${PROTO}" \
              --aerion-bin "${AERION_DIR}/target/debug/aerion" \
              --noders-bin "${PWD}/target/debug/noders" \
              --mihomo-bin /tmp/mihomo \
              --verbose
          else
            python3 workflows/test_all_protocols_mihomo.py \
              --aerion-bin "${AERION_DIR}/target/debug/aerion" \
              --noders-bin "${PWD}/target/debug/noders" \
              --mihomo-bin /tmp/mihomo \
              --verbose
          fi