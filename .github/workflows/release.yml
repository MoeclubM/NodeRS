name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  BIN_NAME: noders-anytls

jobs:
  build:
    name: Build ${{ matrix.asset_suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_suffix: linux-amd64
            archive_ext: tar.gz
            binary_name: noders-anytls
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_suffix: windows-amd64
            archive_ext: zip
            binary_name: noders-anytls.exe
          - os: macos-13
            target: x86_64-apple-darwin
            asset_suffix: macos-amd64
            archive_ext: tar.gz
            binary_name: noders-anytls
          - os: macos-14
            target: aarch64-apple-darwin
            asset_suffix: macos-arm64
            archive_ext: tar.gz
            binary_name: noders-anytls
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Enforce pure Rust protocol implementation
        if: runner.os != 'Windows'
        run: bash scripts/verify-pure-rust.sh

      - name: Enforce pure Rust protocol implementation (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\\scripts\\verify-pure-rust.ps1

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Prepare Unix package
        if: runner.os != 'Windows'
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG:-dev}"
          package_dir="dist/${BIN_NAME}-${tag}-${{ matrix.asset_suffix }}"
          mkdir -p "$package_dir/packaging/systemd"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$package_dir/${BIN_NAME}"
          cp README.md LICENSE config.example.toml "$package_dir/"
          sed "s#__GITHUB_REPOSITORY__#${REPOSITORY}#g" scripts/install.sh > "$package_dir/install.sh"
          sed "s#__GITHUB_REPOSITORY__#${REPOSITORY}#g" scripts/install.ps1 > "$package_dir/install.ps1"
          cp packaging/systemd/noders-anytls.service "$package_dir/packaging/systemd/noders-anytls.service"
          chmod +x "$package_dir/install.sh" "$package_dir/${BIN_NAME}"
          tar -C dist -czf "${package_dir}.tar.gz" "$(basename "$package_dir")"
          shasum -a 256 "${package_dir}.tar.gz" > "${package_dir}.tar.gz.sha256"

      - name: Prepare Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          $tag = $env:RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = 'dev' }
          $packageDir = Join-Path $PWD "dist\$env:BIN_NAME-$tag-${{ matrix.asset_suffix }}"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $packageDir 'packaging\systemd') | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary_name }}" (Join-Path $packageDir '${{ matrix.binary_name }}')
          Copy-Item README.md, LICENSE, config.example.toml $packageDir
          ((Get-Content scripts\install.sh -Raw) -replace '__GITHUB_REPOSITORY__', $env:REPOSITORY) | Set-Content (Join-Path $packageDir 'install.sh')
          ((Get-Content scripts\install.ps1 -Raw) -replace '__GITHUB_REPOSITORY__', $env:REPOSITORY) | Set-Content (Join-Path $packageDir 'install.ps1')
          Copy-Item packaging\systemd\noders-anytls.service (Join-Path $packageDir 'packaging\systemd\noders-anytls.service')
          Compress-Archive -Path (Join-Path $packageDir '*') -DestinationPath "$packageDir.zip" -Force
          $hash = (Get-FileHash "$packageDir.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $([System.IO.Path]::GetFileName("$packageDir.zip"))" | Set-Content "$packageDir.zip.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_suffix }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          fail_on_unmatched_files: true

      - name: Upload combined workflow artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: release-bundles
          path: dist/*
          if-no-files-found: error

