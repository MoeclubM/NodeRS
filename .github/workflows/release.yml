name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  BIN_NAME: noders
  GNU_GLIBC_FLOOR: "2.36"

jobs:
  build-gnu:
    name: Build GNU release bundle (linux-amd64, Debian 12)
    runs-on: ubuntu-latest
    container:
      image: debian:12
    steps:
      - name: Install GNU build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl git build-essential pkg-config cmake clang libclang-dev llvm-dev zstd
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Enforce pure Rust protocol implementation
        run: bash scripts/verify-pure-rust.sh

      - name: Run tests
        run: cargo test --locked --offline

      - name: Build release binary
        run: cargo build --locked --release --target x86_64-unknown-linux-gnu

      - name: Verify GNU glibc requirement
        run: |
          max_glibc="$(readelf --version-info "target/x86_64-unknown-linux-gnu/release/${BIN_NAME}" | grep -o 'GLIBC_[0-9.]*' | sed 's/GLIBC_//' | sort -V | tail -n1)"
          printf 'max required glibc: %s; configured floor: %s\n' "$max_glibc" "$GNU_GLIBC_FLOOR"
          test -n "$max_glibc"
          dpkg --compare-versions "$max_glibc" le "$GNU_GLIBC_FLOOR"

      - name: Prepare release package
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name != 'workflow_dispatch' && github.ref_name || 'dev' }}
        run: |
          set -euo pipefail
          bash scripts/package-release-bundle.sh \
            --release-tag "${RELEASE_TAG:-dev}" \
            --target x86_64-unknown-linux-gnu \
            --asset-suffix linux-amd64

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-release-bundle-linux-amd64
          path: dist/*
          if-no-files-found: error

  build-arm64-gnu:
    name: Build GNU release bundle (linux-arm64, Debian 12)
    runs-on: ubuntu-22.04-arm
    container:
      image: debian:12
    steps:
      - name: Install GNU build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl git build-essential pkg-config cmake clang libclang-dev llvm-dev zstd
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Enforce pure Rust protocol implementation
        run: bash scripts/verify-pure-rust.sh

      - name: Run tests
        run: cargo test --locked --offline --target aarch64-unknown-linux-gnu

      - name: Build release binary
        run: cargo build --locked --release --target aarch64-unknown-linux-gnu

      - name: Verify GNU glibc requirement
        run: |
          max_glibc="$(readelf --version-info "target/aarch64-unknown-linux-gnu/release/${BIN_NAME}" | grep -o 'GLIBC_[0-9.]*' | sed 's/GLIBC_//' | sort -V | tail -n1)"
          printf 'max required glibc: %s; configured floor: %s\n' "$max_glibc" "$GNU_GLIBC_FLOOR"
          test -n "$max_glibc"
          dpkg --compare-versions "$max_glibc" le "$GNU_GLIBC_FLOOR"

      - name: Prepare release package
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name != 'workflow_dispatch' && github.ref_name || 'dev' }}
        run: |
          set -euo pipefail
          bash scripts/package-release-bundle.sh \
            --release-tag "${RELEASE_TAG:-dev}" \
            --target aarch64-unknown-linux-gnu \
            --asset-suffix linux-arm64

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-release-bundle-linux-arm64
          path: dist/*
          if-no-files-found: error

  build-musl:
    name: Build musl release bundle (linux-amd64-musl)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rust-cross/rust-musl-cross:x86_64-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve libclang path
        run: |
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Enforce pure Rust protocol implementation
        run: bash scripts/verify-pure-rust.sh

      - name: Run tests
        run: cargo test --locked --offline --target x86_64-unknown-linux-musl

      - name: Build release binary
        run: cargo build --locked --release --target x86_64-unknown-linux-musl

      - name: Prepare release package
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name != 'workflow_dispatch' && github.ref_name || 'dev' }}
        run: |
          set -euo pipefail
          bash scripts/package-release-bundle.sh \
            --release-tag "${RELEASE_TAG:-dev}" \
            --target x86_64-unknown-linux-musl \
            --asset-suffix linux-amd64-musl

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-release-bundle-linux-amd64-musl
          path: dist/*
          if-no-files-found: error

  build-arm64-musl:
    name: Build musl release bundle (linux-arm64-musl)
    runs-on: ubuntu-22.04-arm
    container:
      image: ghcr.io/rust-cross/rust-musl-cross:aarch64-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve libclang path
        run: |
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Enforce pure Rust protocol implementation
        run: bash scripts/verify-pure-rust.sh

      - name: Run tests
        run: cargo test --locked --offline --target aarch64-unknown-linux-musl

      - name: Build release binary
        run: cargo build --locked --release --target aarch64-unknown-linux-musl

      - name: Prepare release package
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name != 'workflow_dispatch' && github.ref_name || 'dev' }}
        run: |
          set -euo pipefail
          bash scripts/package-release-bundle.sh \
            --release-tag "${RELEASE_TAG:-dev}" \
            --target aarch64-unknown-linux-musl \
            --asset-suffix linux-arm64-musl

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-release-bundle-linux-arm64-musl
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish Linux release assets
    needs: [build-gnu, build-arm64-gnu, build-musl, build-arm64-musl]
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" --repo "${{ github.repository }}" dist/*.tar.gz dist/*.sha256 --clobber
          else
            gh release create "${{ github.ref_name }}" --repo "${{ github.repository }}" --generate-notes dist/*.tar.gz dist/*.sha256
          fi
