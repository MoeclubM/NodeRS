name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    container:
      image: debian:12
    steps:
      - name: Install CI dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl git build-essential pkg-config cmake clang libclang-dev llvm-dev sudo zstd
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Enforce pure Rust protocol implementation
        run: bash scripts/verify-pure-rust.sh

      - name: Run management script tests
        run: sudo -E bash scripts/test-management-script.sh

      - name: Run formatter check
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked --offline
