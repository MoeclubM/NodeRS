name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install clang for bindgen
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev llvm-dev
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Enforce pure Rust protocol implementation
        run: bash scripts/verify-pure-rust.sh

      - name: Run management script tests
        run: sudo -E bash scripts/test-management-script.sh

      - name: Run formatter check
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked --offline

  perf-smoke:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install clang for bindgen
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev llvm-dev
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Build release binaries
        run: cargo build --locked --release --bin noders --bin bench_anytls

      - name: Run perf smoke benchmark
        run: |
          python3 scripts/perf_smoke.py \
            --binary-dir target/release \
            --output-dir target/perf-smoke

      - name: Upload perf smoke artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: perf-smoke
          path: target/perf-smoke
          if-no-files-found: error
