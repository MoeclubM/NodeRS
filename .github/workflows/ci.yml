name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    container:
      image: debian:12
    steps:
      - name: Install CI dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl git build-essential pkg-config cmake clang libclang-dev llvm-dev sudo zstd
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Checkout
        shell: bash
        run: |
          git init .
          git config --global --add safe.directory "$PWD"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Install Rust toolchain
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain stable --component rustfmt
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Enforce pure Rust protocol implementation
        run: bash scripts/verify-pure-rust.sh

      - name: Run management script tests
        run: sudo -E bash scripts/test-management-script.sh

      - name: Run formatter check
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked --offline
